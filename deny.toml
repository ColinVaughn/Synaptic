# cargo-deny configuration. Run locally with `cargo deny check`.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071 (Marvin Attack in the `rsa` crate) has no patched release.
    # `rsa` is pulled in only by sqlx's MySQL driver (the optional, off-by-default
    # `live-explain` feature), and only for client-side password encryption with
    # the server's PUBLIC key during caching_sha2_password auth -- the vulnerable
    # RSA private-key path the timing attack targets is never exercised here.
    # Revisit when a constant-time `rsa` release ships (RustCrypto/RSA#390).
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
confidence-threshold = 0.8
# Permissive licenses common in the Rust ecosystem, plus this project's own
# AGPL-3.0-or-later. Tuned to the actual dependency set.
allow = [
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
