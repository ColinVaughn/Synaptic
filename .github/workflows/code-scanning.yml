name: Code scanning

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    name: clippy (SARIF)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif,sarif-fmt
      # Collect clippy findings as SARIF for the GitHub Security tab. This does not
      # gate the build (the lint job already enforces -D warnings); it surfaces
      # findings over time in code scanning.
      - name: clippy -> SARIF
        run: cargo clippy --workspace --all-targets --all-features --message-format=json
          | clippy-sarif | tee results.sarif | sarif-fmt
        continue-on-error: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: clippy
