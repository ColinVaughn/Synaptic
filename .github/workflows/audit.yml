name: Audit

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # RUSTSEC-2023-0071 (Marvin Attack, `rsa` crate) has no patched release. It
      # enters only via sqlx's optional MySQL driver and only on the client-side
      # public-key encryption path, never the vulnerable private-key path. Matched
      # by the `ignore` in deny.toml. Drop this flag once a constant-time `rsa` ships.
      - run: cargo audit --ignore RUSTSEC-2023-0071
