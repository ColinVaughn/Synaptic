name: CI
on: [push, pull_request]

permissions:
  contents: read

# Cancel superseded runs on the same ref so a quick succession of pushes to a PR
# doesn't pile up redundant matrix runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --locked

  # End-to-end MCP protocol conformance against the real `synaptic serve`
  # binary over stdio (handshake + structured tool calls), on every OS. Isolates
  # a protocol regression from the unit suite and proves the new tiktoken-rs
  # dependency builds and runs on macOS and Windows.
  mcp-conformance:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p synaptic --test mcp_e2e --all-features --locked

  # Catch broken intra-doc links and doc-comment examples that the test/lint jobs
  # don't surface. Does not gate on the dependency graph (--no-deps).
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features --locked

  # One job per language grammar: each `lang-*` feature is built and tested in
  # isolation, so a grammar bump that silently drops nodes/edges (or breaks a
  # single language's compile) fails CI on its own rather than hiding in the
  # all-features build.
  extract-langs:
    strategy:
      fail-fast: false
      matrix:
        lang:
          - python
          - javascript
          - typescript
          - go
          - rust
          - java
          - csharp
          - kotlin
          - swift
          - c
          - cpp
          - json
          - yaml
          - hcl
          - sql
          - ruby
          - php
          - lua
          - bash
          - powershell
          - scala
          - dart
          - elixir
          - julia
          - zig
          - asp
          - groovy
          - objc
          - verilog
          - fortran
          - vue
          - svelte
          - astro
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p synaptic-extract --no-default-features --features lang-${{ matrix.lang }} --locked
